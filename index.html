<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#edeae3;--surface:#fff;--s2:#f5f3ee;
  --b:rgba(0,0,0,.09);--b2:rgba(0,0,0,.15);
  --acc:#1c4ed8;--accl:#dbeafe;
  --sbg:#1c4ed8;--stxt:#fff;
  --bbg:#fff;--btxt:#111827;
  --sys:#9ca3af;--mut:#6b7280;--pri:#111827;
  --pd:#1c4ed8;--pc:#93c5fd;--pe:#e5e7eb;
  --font:"DM Sans",system-ui,sans-serif;
  --mono:"DM Mono",monospace;
  --r:16px;--rb:18px
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--pri)}
body{display:flex;flex-direction:column;align-items:center;padding:20px 12px 32px;min-height:100%}
.rbar{width:100%;max-width:600px;background:#111;border-radius:8px;padding:9px 14px;margin-bottom:10px;font-family:var(--mono);font-size:11px;color:#999;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rtag{background:#22c55e;color:#111;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap}
.rbar label{color:#22c55e;white-space:nowrap}
.rbar select{background:#1a1a1a;color:#ddd;border:1px solid #333;border-radius:4px;padding:3px 8px;font-family:var(--mono);font-size:11px;cursor:pointer;outline:none}
.rpill{margin-left:auto;background:#1a1a1a;color:#22c55e;border:1px solid #2a2a2a;border-radius:20px;padding:2px 9px;font-size:10px;white-space:nowrap}
.card{width:100%;max-width:600px;background:var(--surface);border-radius:var(--r);box-shadow:0 4px 24px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.hdr{background:var(--surface);border-bottom:1px solid var(--b);padding:14px 18px;display:flex;align-items:center;gap:11px;flex-shrink:0}
.av{width:38px;height:38px;border-radius:50%;background:var(--accl);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;flex-shrink:0;position:relative;border:1.5px solid var(--b2)}
.av::after{content:"";position:absolute;bottom:0;right:0;width:9px;height:9px;background:#22c55e;border-radius:50%;border:2px solid white}
.hinfo{flex:1;min-width:0}
.hname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hsub{font-size:11.5px;color:var(--mut);margin-top:1px}
.hbadge{font-family:var(--mono);font-size:10px;color:var(--mut);background:var(--s2);border:1px solid var(--b);border-radius:20px;padding:3px 9px;white-space:nowrap;flex-shrink:0}
.pbar{background:var(--surface);border-bottom:1px solid var(--b);padding:7px 18px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.plbl{font-family:var(--mono);font-size:10px;color:var(--mut);white-space:nowrap}
.pips{display:flex;gap:4px;flex:1}
.pip{height:4px;flex:1;background:var(--pe);border-radius:2px;transition:background .35s}
.pip.done{background:var(--pd)}.pip.cur{background:var(--pc)}
.plbl2{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--acc);white-space:nowrap;min-width:36px;text-align:right}
.msgs{flex:1;overflow-y:auto;padding:16px 14px;background:var(--s2);display:flex;flex-direction:column;gap:8px;min-height:260px;max-height:420px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:4px}.msgs::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px}
.connecting{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 0;background:var(--s2)}
.spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:var(--acc);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ctxt{font-size:13px;color:var(--mut)}
.row{display:flex;gap:7px;align-items:flex-end;animation:rise .2s ease both}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.row.buyer{flex-direction:row}.row.seller{flex-direction:row-reverse}
.mav{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;border:1.5px solid var(--b);align-self:flex-end}
.mav.b{background:var(--accl);color:var(--acc)}.mav.s{background:#fef3c7;color:#b45309}
.grp{display:flex;flex-direction:column;max-width:calc(100% - 70px);min-width:0}
.row.seller .grp{align-items:flex-end}
.bbl{padding:9px 13px;border-radius:var(--rb);font-size:14px;line-height:1.5;word-break:break-word}
.row.buyer .bbl{background:var(--bbg);color:var(--btxt);border:1px solid var(--b);border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.row.seller .bbl{background:var(--sbg);color:var(--stxt);border-bottom-right-radius:4px;box-shadow:0 2px 6px rgba(28,78,216,.22)}
.ts{font-size:10px;color:var(--mut);margin-top:3px;padding:0 3px}
.row.seller .ts{text-align:right}
.sys{text-align:center;font-size:11.5px;color:var(--sys);padding:2px 0;animation:rise .2s ease both}
.twrap{background:var(--s2);padding:0 14px 6px;min-height:30px;flex-shrink:0}
.trow{display:none;gap:7px;align-items:flex-end;animation:rise .18s ease both}
.trow.on{display:flex}
.tbbl{background:var(--bbg);border:1px solid var(--b);border-radius:var(--rb);border-bottom-left-radius:4px;padding:10px 14px;display:flex;gap:4px;align-items:center;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.dot{width:5px;height:5px;background:#9ca3af;border-radius:50%;animation:tdot 1.2s infinite ease-in-out}
.dot:nth-child(2){animation-delay:.14s}.dot:nth-child(3){animation-delay:.28s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.6}30%{transform:translateY(-4px);opacity:1}}
.errmsg{font-size:11.5px;color:#ef4444;padding:3px 16px;background:var(--surface);font-style:italic;min-height:18px;flex-shrink:0}
.iarea{background:var(--surface);border-top:1px solid var(--b);padding:11px 14px;display:flex;gap:9px;align-items:center;flex-shrink:0}
.inp{flex:1;min-width:0;background:var(--s2);border:1.5px solid var(--b2);border-radius:24px;padding:9px 15px;font-family:var(--font);font-size:14px;color:var(--pri);outline:none;transition:border-color .15s,box-shadow .15s}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(28,78,216,.09);background:#fff}
.inp:disabled{opacity:.45;cursor:not-allowed}
.inp::placeholder{color:#b0b7c3}
.sbtn{width:38px;height:38px;flex-shrink:0;border-radius:50%;background:var(--acc);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s,opacity .12s;box-shadow:0 2px 8px rgba(28,78,216,.28)}
.sbtn:hover:not(:disabled){transform:scale(1.06)}.sbtn:active:not(:disabled){transform:scale(.95)}.sbtn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.sbtn svg{width:16px;height:16px;fill:#fff;display:block}
.ftr{background:var(--surface);border-top:1px solid var(--b);padding:7px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}

// ── TYPO SYSTEM ───────────────────────────────────────────────
var TYPO_RATE = 0.25;
var TYPOS = [
  ["thinking","thinkign","*thinking"],   ["around","arounnd","*around"],
  ["budget","budegt","*budget"],         ["probably","prolbably","*probably"],
  ["possible","posisble","*possible"],   ["difficult","diffcult","*difficult"],
  ["something","somethign","*something"],["hoping","hpoing","*hoping"],
  ["afraid","afraind","*afraid"],        ["offer","offfer","*offer"],
  ["agree","agere","*agree"],            ["price","pirce","*price"],
  ["final","fianl","*final"],            ["apart","apprt","*apart"],
  ["certain","ceratin","*certain"],      ["higher","hgiher","*higher"]
];

function applyTypo(text) {
  if (Math.random() > TYPO_RATE) return [text];
  var hits = TYPOS.filter(function(t) {
    return text.toLowerCase().indexOf(t[0]) !== -1;
  });
  if (!hits.length) return [text];
  var pick = hits[Math.floor(Math.random() * hits.length)];
  var typoText = text.replace(new RegExp(pick[0], "i"), pick[1]);
  return [typoText, pick[2]];
}

// ── HELPERS ───────────────────────────────────────────────────
function C() { return S[CONDITION]; }
function pk(a, c) { return a[c % a.length]; }

function hasKW(txt, words) {
  var t = txt.toLowerCase();
  return words.some(function(w) { return t.indexOf(w) !== -1; });
}

// ── PRICE PARSER ──────────────────────────────────────────────
// FIX 1: questions containing "?" never parsed as price offers
// FIX 2: takes the LAST price in multi-price messages (e.g. "$55 is low, can you do $100?")
// FIX 3: bare numbers capped at 3 digits only when offer-context words present
// FIX 4: consistent upper limit of $10,000 with or without $
function px(t) {
  var lower = t.toLowerCase().trim();

  // Questions that end with "?" AND contain no $ sign = not an offer
  // e.g. "hi nancy! would you buy it for 150?" — no $ so treat as question
  if (t.indexOf("?") !== -1 && t.indexOf("$") === -1) return null;

  // Questions that start with question words = not an offer
  var qstarters = ["why","how come","what if","is that","is this","does that","can you explain"];
  for (var i = 0; i < qstarters.length; i++) {
    if (lower.indexOf(qstarters[i]) === 0) return null;
  }

  // Extract ALL dollar-sign prices
  var dollarMatches = t.match(/\$\s*(\d+(?:\.\d{1,2})?)/g);
  if (dollarMatches && dollarMatches.length > 0) {
    // FIX: take LAST price (handles "$55 is low, can you do $100?")
    var lastDollar = dollarMatches[dollarMatches.length - 1];
    return parseFloat(lastDollar.replace(/[^\d.]/g, ""));
  }

  // Word-form prices
  var m = t.match(/\b(\d+)\s*(?:dollars?|bucks?)/i);
  if (m) return parseFloat(m[1]);

  // Bare numbers — only if offer-context words present
  // Cap at 3 digits (999) without $ sign — matches Aastha's observation
  var offerWords = ["offer","asking","want","take","accept","sell","how about","maybe","price","do","go","for","at","around"];
  var hasOW = offerWords.some(function(w) { return lower.indexOf(w) !== -1; });
  if (hasOW) {
    // Only match 2-3 digit numbers for bare number offers
    // Cap at 120 without $ — prevents "150", "200" etc being parsed as offers
    // Participants can always use $ for higher amounts
    m = t.match(/\b(\d{2,3})\b/);
    if (m) {
      var n = parseFloat(m[1]);
      if (n <= 120) return n;
    }
  }

  // Last resort — standalone number as entire message
  // With $: up to 10000. Without $: 2-3 digits only (max 999)
  var standaloneWithDollar = t.trim().match(/^\$\s*(\d+(?:\.\d{1,2})?)$/);
  if (standaloneWithDollar) return parseFloat(standaloneWithDollar[1]);
  // Bare standalone: ONLY 2-3 digit numbers, max 120 without $
  // For higher prices, participants should use $ sign (e.g. $150)
  var standaloneBarenumber = t.trim().match(/^(\d{2,3})$/);
  if (standaloneBarenumber) {
    var n = parseFloat(standaloneBarenumber[1]);
    if (n <= 120) return n;
  }

  return null;
}

function vp(p) {
  if (p === null || p === undefined) return null;
  if (p <= 0 || p > 10000) return null;
  return p;
}

// FIX: "hi nancy! would you buy it for 150?" — extract price even if greeting is detected
function pxFromGreeting(t) {
  var m = t.match(/\$\s*(\d+(?:\.\d{1,2})?)/g);
  if (m) return parseFloat(m[m.length-1].replace(/[^\d.]/g,""));
  m = t.match(/(?:for|at|take|want|asking)\s+\$?(\d+)/i);
  if (m) return parseFloat(m[1]);
  return null;
}

function tstamp() {
  return new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

function parseStep(s) {
  if (!s) return [];
  s = s.replace(/\^\^\^/g,"").replace(/\$\$\$/g,"").replace(/@@@/g,"").trim();
  return s.split("%%%").map(function(x){return x.trim();}).filter(Boolean);
}

// ── FIRE LINES ────────────────────────────────────────────────
var INACT_MSGS = [
  "Hello, are you there?",
  "Hello?",
  "Hmm, maybe you got disconnected?",
  "I'll wait a bit longer, but let me know if you're still there."
];

function fire(lines, cb, doTypo) {
  enInp(false);
  if (doTypo && lines.length > 0) {
    var t = applyTypo(lines[0]);
    if (t.length > 1) lines = t.concat(lines.slice(1));
  }
  var i = 0;
  function nxt() {
    if (i >= lines.length) { if(cb) cb(); return; }
    var ln = lines[i++]; if (!ln) { nxt(); return; }
    var d = ln.charAt(0) === "*" ? 800 : TBASE + (ln.length * TPC);
    setTimeout(function() { typing(true); }, 1500);
    setTimeout(function() { typing(false); addBuyer(ln); nxt(); }, 1500 + d);
  }
  nxt();
}

// ── INACTIVITY ────────────────────────────────────────────────
function startInact() {
  clearTimeout(inactTimer);
  clearTimeout(disconnectTimer);
  if (inactLvl >= INACT_MSGS.length) return;
  inactTimer = setTimeout(function() {
    if (done || !submitOk || D.inp.disabled) return;
    var msg = INACT_MSGS[inactLvl];
    inactLvl++;
    fire([msg], function() {
      enInp(true);
      if (inactLvl < INACT_MSGS.length) startInact();
    }, false);
  }, TINACT);
  disconnectTimer = setTimeout(function() {
    if (done) return;
    addSys("The buyer has disconnected due to inactivity. Session ended.");
    done = true; enInp(false);
    document.getElementById("stnote").textContent = "Session ended";
    save(0, round, false);
  }, TDISCONNECT);
}
function stopInact() { clearTimeout(inactTimer); clearTimeout(disconnectTimer); inactLvl = 0; }

// ── NEGOTIATION ENGINE ────────────────────────────────────────
function handle(txt, preP) {
  stopInact();
  var c = C();
  var p = (preP !== undefined) ? preP : vp(px(txt));
  if (p !== null) lastPrice = p;

  // No price detected
  if (p === null) {
    fire([pk(c.nudges, nc)], function(){ nc++; enInp(true); startInact(); }, false);
    return;
  }

  // FIX: highball response for unreasonably high prices (>$150) in first round
  if (p > HIGHBALL && round === 0) {
    round++; updateUI();
    fire([pk(c.highball, hc)], function(){ hc++; enInp(true); startInact(); }, false);
    return;
  }

  round++; updateUI();

  // Accept ANY price <= BUYER_MAX immediately, regardless of round or ladder
  if (p <= BUYER_MAX) {
    fire([c.accept], function() {
      addSys("Deal reached at $"+p+" in round "+round);
      done = true; enInp(false);
      document.getElementById("stnote").textContent = "Deal at $"+p;
      document.getElementById("hbadge").textContent = "Deal at $"+p;
      save(p, round, true);
    }, false);
    return;
  }

  // Price above $100 — fire next scripted counteroffer if available
  if (si < c.steps.length - 1) {
    var lines = parseStep(c.steps[si]); si++;
    fire(lines, function(){ enInp(true); startInact(); }, true);
    return;
  }

  // Exhausted all offers — exit
  var exitLines = parseStep(c.steps[c.steps.length - 1]);
  fire(exitLines, function() {
    addSys("No deal reached after "+round+" rounds");
    done = true; enInp(false);
    document.getElementById("stnote").textContent = "No deal";
    save(0, round, false);
  }, false);
}

function save(price, rnd, reached) {
  try {
    Qualtrics.SurveyEngine.setEmbeddedData("deal_price",   price);
    Qualtrics.SurveyEngine.setEmbeddedData("deal_round",   rnd);
    Qualtrics.SurveyEngine.setEmbeddedData("deal_reached", reached ? "1" : "0");
    Qualtrics.SurveyEngine.setEmbeddedData("chat_log",     JSON.stringify(chatLog));
  } catch(e) {}
}

// ── CAPTURE ───────────────────────────────────────────────────
function capture() {
  if (!submitOk || done) return;
  var raw = D.inp.value.trim();
  if (!raw) return;
  if (raw.length > 300) { showErr("Please keep your message under 300 characters."); return; }

  addSeller(raw);
  D.inp.value = "";
  enInp(false);
  var c = C();

  // FIX: "say/type X" bot detection test — respond as X
  if (hasKW(raw, KW_SAY_TEST)) {
    var sayMatch = raw.match(/(?:say|type)\s+([a-z]+)/i);
    var sayWord = sayMatch ? sayMatch[1] : "ha";
    fire([sayWord + "! Anyway, shall we get back to the price?"],
      function(){ enInp(true); startInact(); }, false);
    return;
  }

  // FIX: walkaway confirmation — if we sent retention and seller confirms leaving
  if (awaitingWalkawayConfirm) {
    awaitingWalkawayConfirm = false;
    if (hasKW(raw, KW_WALKAWAY2) || hasKW(raw, KW_WALKAWAY)) {
      fire([pk(c.walkaway2, wc2)], function() {
        wc2++;
        addSys("Seller chose to end the negotiation.");
        done = true; enInp(false);
        document.getElementById("stnote").textContent = "Seller walked away";
        save(0, round, false);
      }, false);
      return;
    }
    // Seller changed mind — continue
  }

  // Greeting (round 0 only) — but extract price if present
  if (round === 0 && hasKW(raw, KW_GREETING)) {
    var embeddedPrice = vp(pxFromGreeting(raw));
    if (embeddedPrice !== null) {
      // Greeting contains a price — handle the price directly
      handle(raw, embeddedPrice);
      return;
    }
    fire([pk(c.greeting, gc)], function(){ gc++; enInp(true); startInact(); }, false);
    return;
  }

  // AI suspicion
  if (hasKW(raw, KW_SUSPICION)) {
    fire([pk(c.suspicion, sc)], function(){ sc++; enInp(true); startInact(); }, false);
    return;
  }

  // Abusive
  if (hasKW(raw, KW_ABUSIVE)) {
    fire([pk(c.abusive, ac)], function(){ ac++; enInp(true); startInact(); }, false);
    return;
  }

  // Walk away — first attempt (retention)
  if (hasKW(raw, KW_WALKAWAY) && round < 6 && !awaitingWalkawayConfirm) {
    awaitingWalkawayConfirm = true;
    fire([pk(c.walkaway, wc)], function(){ wc++; enInp(true); startInact(); }, false);
    return;
  }

  // Why / reasoning questions
  if (hasKW(raw, KW_WHY) && round > 0) {
    fire([pk(c.whyreason, wrc)], function(){ wrc++; enInp(true); startInact(); }, false);
    return;
  }

  // Reiterate last offer
  if (hasKW(raw, KW_REITERATE) && round > 0) {
    fire([pk(c.reiterate, rc)], function(){ rc++; enInp(true); startInact(); }, false);
    return;
  }

  // Off-topic / frustration
  if (hasKW(raw, KW_OFFTOPIC)) {
    fire([pk(c.offtopic, oc)], function(){ oc++; enInp(true); startInact(); }, false);
    return;
  }

  // Price logic — take last price in message
  var finalP = vp(px(raw));
  handle(raw, finalP);
}

  document.getElementById("stnote").textContent = "";
  document.getElementById("plbl2").textContent  = "$\u2014";
  document.getElementById("hbadge").textContent = "Round 0 / 6";
  for (var i=1; i<=6; i++) document.getElementById("p"+i).className = "pip";
  condUI(); enInp(false);

  var sc2 = mk("div","connecting");
  sc2.innerHTML = "<div class=\"spinner\"></div><span class=\"ctxt\">Connecting to buyer\u2026</span>";
  D.msgs.appendChild(sc2);

  setTimeout(function() {
    D.msgs.innerHTML = "";
    addSys("All chat participants have arrived. You may now chat!");
    var openLines = parseStep(C().steps[0]);
    fire(openLines, function() {
      round = 1; lastPrice = LADDER[1]; updateUI();
      enInp(true); startInact();
    }, false);
  }, TSTART);
}

// ── INIT ──────────────────────────────────────────────────────
window.onload = function() {
  D.msgs   = document.getElementById("msgs");
  D.inp    = document.getElementById("inp");
  D.sbtn   = document.getElementById("sbtn");
  D.trow   = document.getElementById("trow");
  D.tav    = document.getElementById("tav");
  D.errmsg = document.getElementById("errmsg");

  D.sbtn.addEventListener("click", capture);
  D.inp.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && submitOk) capture();
  });
  document.getElementById("condSel").addEventListener("change", function() {
    CONDITION = this.value; reset();
  });
  document.getElementById("rbtn").addEventListener("click", reset);
  CONDITION = document.getElementById("condSel").value;
  reset();
};
</script>
